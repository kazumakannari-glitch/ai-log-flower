<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-LOG FLOWER</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf8f2;
    --warm-white: #fffcf7;
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --text-dark: #2c2416;
    --text-mid: #6b5a3e;
    --text-light: #a08c6e;
    --rose: #e8a0a0;
    --coral: #f2956e;
    --amber: #f0c060;
    --sage: #8faa88;
    --blush: #f5d0c8;
    --lavender: #c8b8e0;
    --sky: #90c0d8;
    --deep-blue: #4a6fa0;
    --shadow: rgba(44,36,22,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Noto Serif JP', serif;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(232,213,176,0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(245,208,200,0.2) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--gold-light);
  }

  .logo-mark {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
  }

  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--text-dark);
  }

  .logo-text span {
    color: var(--gold);
  }

  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-light);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* Stage indicator */
  .stage-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 24px 32px;
  }

  .stage-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
    opacity: 0.3;
    transition: opacity 0.6s ease;
  }

  .stage-item.active { opacity: 1; }
  .stage-item.done { opacity: 0.7; }

  .stage-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--gold-light);
    border: 1.5px solid var(--gold);
    transition: all 0.6s ease;
  }

  .stage-item.active .stage-dot {
    background: var(--gold);
    box-shadow: 0 0 12px rgba(201,169,110,0.5);
  }

  .stage-item.done .stage-dot {
    background: var(--gold);
  }

  .stage-line {
    flex: 1;
    height: 1px;
    background: var(--gold-light);
    margin-bottom: 16px;
  }

  .stage-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-light);
    text-align: center;
  }

  /* Flower canvas */
  .flower-canvas {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 12px;
  }

  .flower-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Stage message */
  .stage-message {
    text-align: center;
    padding: 0 32px 24px;
  }

  .stage-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-dark);
    margin-bottom: 6px;
    min-height: 32px;
    transition: all 0.5s ease;
  }

  .stage-desc {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    line-height: 1.8;
    min-height: 36px;
  }

  /* Emotion badge */
  .emotion-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid currentColor;
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.5s ease;
  }

  .emotion-badge.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .emotion-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Input area */
  .input-area {
    padding: 0 24px;
  }

  .upload-zone {
    border: 1.5px dashed var(--gold-light);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255,252,247,0.8);
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover {
    border-color: var(--gold);
    background: rgba(201,169,110,0.05);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-preview {
    display: none;
    width: 80px;
    height: 80px;
    border-radius: 10px;
    object-fit: cover;
    margin: 0 auto 8px;
  }

  .upload-preview.visible { display: block; }

  .upload-icon {
    font-size: 24px;
    margin-bottom: 6px;
    display: block;
  }

  .upload-text {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.1em;
  }

  .text-input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .diary-input {
    width: 100%;
    background: var(--warm-white);
    border: 1.5px solid var(--gold-light);
    border-radius: 16px;
    padding: 16px 20px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--text-dark);
    resize: none;
    height: 90px;
    outline: none;
    transition: border-color 0.3s;
    line-height: 1.8;
  }

  .diary-input::placeholder {
    color: var(--text-light);
    font-size: 12px;
  }

  .diary-input:focus {
    border-color: var(--gold);
  }

  .char-count {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 10px;
    color: var(--text-light);
  }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, #b8904a 100%);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(201,169,110,0.35);
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,169,110,0.45);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Log history */
  .log-history {
    padding: 28px 24px 0;
  }

  .log-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-light);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .log-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(201,169,110,0.15);
    animation: fadeSlideIn 0.5s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-thumb {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--gold-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .log-content { flex: 1; }

  .log-emotion {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-light);
    margin-bottom: 3px;
  }

  .log-text {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  /* Completion screen */
  .completion {
    display: none;
    text-align: center;
    padding: 20px 32px 40px;
    animation: fadeIn 1s ease;
  }

  .completion.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  .completion-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    font-style: italic;
    color: var(--text-dark);
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .completion-sub {
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: 0.2em;
    line-height: 2;
    margin-bottom: 28px;
  }

  .reset-btn {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    border-radius: 50px;
    padding: 12px 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .reset-btn:hover {
    background: var(--gold);
    color: white;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparklePop 1.2s ease forwards;
  }

  @keyframes sparklePop {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    40% { opacity: 1; transform: scale(1.2) rotate(20deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(40deg) translateY(-30px); }
  }

  /* Petal burst on bloom */
  .petal-burst {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    animation: petalFall linear forwards;
  }

  @keyframes petalFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="4" fill="#c9a96e"/>
      <ellipse cx="24" cy="14" rx="5" ry="8" fill="#e8c88a" opacity="0.7"/>
      <ellipse cx="24" cy="34" rx="5" ry="8" fill="#e8c88a" opacity="0.7"/>
      <ellipse cx="14" cy="24" rx="8" ry="5" fill="#f0d0a0" opacity="0.6"/>
      <ellipse cx="34" cy="24" rx="8" ry="5" fill="#f0d0a0" opacity="0.6"/>
      <ellipse cx="16.5" cy="16.5" rx="5" ry="7" fill="#f5d8b0" opacity="0.5" transform="rotate(-45 16.5 16.5)"/>
      <ellipse cx="31.5" cy="31.5" rx="5" ry="7" fill="#f5d8b0" opacity="0.5" transform="rotate(-45 31.5 31.5)"/>
      <ellipse cx="31.5" cy="16.5" rx="5" ry="7" fill="#f5d8b0" opacity="0.5" transform="rotate(45 31.5 16.5)"/>
      <ellipse cx="16.5" cy="31.5" rx="5" ry="7" fill="#f5d8b0" opacity="0.5" transform="rotate(45 16.5 31.5)"/>
    </svg>
    <div class="logo-text">AI-LOG <span>FLOWER</span></div>
    <div class="logo-sub">あなたの1年間が、花になる</div>
  </div>

  <!-- Stage bar -->
  <div class="stage-bar">
    <div class="stage-item active" id="stage-0">
      <div class="stage-dot"></div>
      <div class="stage-label">種</div>
    </div>
    <div class="stage-line"></div>
    <div class="stage-item" id="stage-1">
      <div class="stage-dot"></div>
      <div class="stage-label">発芽</div>
    </div>
    <div class="stage-line"></div>
    <div class="stage-item" id="stage-2">
      <div class="stage-dot"></div>
      <div class="stage-label">成長</div>
    </div>
    <div class="stage-line"></div>
    <div class="stage-item" id="stage-3">
      <div class="stage-dot"></div>
      <div class="stage-label">開花</div>
    </div>
  </div>

  <!-- Flower canvas -->
  <div class="flower-canvas" id="flowerCanvas">
    <svg class="flower-svg" id="flowerSvg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="soilGrad" cx="50%" cy="60%" r="50%">
          <stop offset="0%" stop-color="#d4a96a" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#b8864a" stop-opacity="0.1"/>
        </radialGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#fff8e8" stop-opacity="0"/>
        </radialGradient>
        <filter id="softBlur">
          <feGaussianBlur stdDeviation="2"/>
        </filter>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Ground -->
      <ellipse id="ground" cx="160" cy="275" rx="70" ry="12" fill="url(#soilGrad)"/>

      <!-- Stage 0: Seed -->
      <g id="seedGroup">
        <ellipse cx="160" cy="270" rx="10" ry="7" fill="#b8864a" opacity="0.8"/>
        <ellipse cx="160" cy="270" rx="6" ry="4" fill="#d4a96a" opacity="0.6"/>
        <ellipse cx="157" cy="268" rx="2" ry="3" fill="#e8c88a" opacity="0.5" transform="rotate(-20 157 268)"/>
      </g>

      <!-- Stage 1: Sprout (hidden initially) -->
      <g id="sproutGroup" opacity="0" transform="translate(0,20)">
        <!-- Stem -->
        <path d="M160 270 Q158 240 160 210" stroke="#6b8f5e" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Two small leaves -->
        <ellipse cx="152" cy="235" rx="10" ry="5" fill="#7aaa6a" opacity="0.85" transform="rotate(-30 152 235)"/>
        <ellipse cx="168" cy="228" rx="10" ry="5" fill="#8abc7a" opacity="0.85" transform="rotate(30 168 228)"/>
        <!-- Tiny bud -->
        <ellipse cx="160" cy="210" rx="5" ry="7" fill="#f0a0a0" opacity="0.7"/>
      </g>

      <!-- Stage 2: Growing (hidden initially) -->
      <g id="growingGroup" opacity="0" transform="translate(0,10)">
        <!-- Taller stem -->
        <path d="M160 272 Q155 240 158 195 Q160 170 160 155" stroke="#5a7a50" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Leaves -->
        <ellipse cx="148" cy="230" rx="18" ry="7" fill="#6aaa5a" opacity="0.8" transform="rotate(-35 148 230)"/>
        <ellipse cx="172" cy="210" rx="16" ry="6" fill="#7abc6a" opacity="0.8" transform="rotate(25 172 210)"/>
        <ellipse cx="145" cy="185" rx="14" ry="5" fill="#5a9a4a" opacity="0.75" transform="rotate(-40 145 185)"/>
        <!-- Bud getting larger -->
        <ellipse cx="160" cy="152" rx="10" ry="13" fill="#f0b0b0" opacity="0.8"/>
        <ellipse cx="155" cy="148" rx="6" ry="10" fill="#f8c8c0" opacity="0.6" transform="rotate(-10 155 148)"/>
        <ellipse cx="165" cy="148" rx="6" ry="10" fill="#f8c8c0" opacity="0.6" transform="rotate(10 165 148)"/>
      </g>

      <!-- Stage 3: Bloom (hidden initially) -->
      <g id="bloomGroup" opacity="0">
        <!-- Main stem -->
        <path d="M160 272 Q154 235 157 195 Q159 165 160 140" stroke="#4a6a40" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- Full leaves -->
        <ellipse cx="143" cy="225" rx="22" ry="8" fill="#5a9a4a" opacity="0.85" transform="rotate(-38 143 225)"/>
        <ellipse cx="177" cy="205" rx="20" ry="7" fill="#6aaa5a" opacity="0.85" transform="rotate(30 177 205)"/>
        <ellipse cx="140" cy="178" rx="18" ry="6" fill="#4a8a3a" opacity="0.8" transform="rotate(-42 140 178)"/>

        <!-- Glow behind flower -->
        <circle cx="160" cy="115" r="55" fill="url(#glowGrad)" filter="url(#softBlur)"/>

        <!-- Petals - will be colored dynamically -->
        <!-- Back petals -->
        <ellipse id="p-b1" cx="160" cy="75" rx="18" ry="30" fill="#f0a0a0" opacity="0.7"/>
        <ellipse id="p-b2" cx="160" cy="75" rx="18" ry="30" fill="#f0a0a0" opacity="0.7" transform="rotate(45 160 115)"/>
        <ellipse id="p-b3" cx="160" cy="75" rx="18" ry="30" fill="#f0a0a0" opacity="0.7" transform="rotate(90 160 115)"/>
        <ellipse id="p-b4" cx="160" cy="75" rx="18" ry="30" fill="#f0a0a0" opacity="0.7" transform="rotate(135 160 115)"/>
        <!-- Front petals -->
        <ellipse id="p-f1" cx="160" cy="78" rx="16" ry="28" fill="#f8b8b8" opacity="0.85" transform="rotate(22.5 160 115)"/>
        <ellipse id="p-f2" cx="160" cy="78" rx="16" ry="28" fill="#f8b8b8" opacity="0.85" transform="rotate(67.5 160 115)"/>
        <ellipse id="p-f3" cx="160" cy="78" rx="16" ry="28" fill="#f8b8b8" opacity="0.85" transform="rotate(112.5 160 115)"/>
        <ellipse id="p-f4" cx="160" cy="78" rx="16" ry="28" fill="#f8b8b8" opacity="0.85" transform="rotate(157.5 160 115)"/>
        <!-- Center -->
        <circle cx="160" cy="115" r="18" fill="#f5c842" filter="url(#glow)"/>
        <circle cx="160" cy="115" r="12" fill="#f0d060"/>
        <circle cx="160" cy="115" r="7" fill="#e8c040"/>
        <!-- Stamens -->
        <circle cx="155" cy="110" r="2" fill="#c8a020" opacity="0.7"/>
        <circle cx="165" cy="110" r="2" fill="#c8a020" opacity="0.7"/>
        <circle cx="160" cy="107" r="2" fill="#c8a020" opacity="0.7"/>
        <circle cx="155" cy="120" r="1.5" fill="#c8a020" opacity="0.6"/>
        <circle cx="165" cy="120" r="1.5" fill="#c8a020" opacity="0.6"/>
      </g>

    </svg>
  </div>

  <!-- Stage message -->
  <div class="stage-message">
    <div id="emotionBadge" class="emotion-badge"></div>
    <div id="stageTitle" class="stage-title">あなたの種、待っています</div>
    <div id="stageDesc" class="stage-desc">今日の写真と、一言を届けてください。<br>思いが、花の栄養になります。</div>
  </div>

  <!-- Input area -->
  <div class="input-area" id="inputArea">
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="photoInput" onchange="handlePhoto(event)">
      <img id="uploadPreview" class="upload-preview" src="" alt="">
      <span class="upload-icon" id="uploadIcon">📷</span>
      <div class="upload-text" id="uploadText">今日の写真を追加</div>
    </div>

    <div class="text-input-wrap">
      <textarea class="diary-input" id="diaryInput" placeholder="今日の気持ちや出来事を…&#10;例：今日は二人で初めての料理をした。うまくできた！" maxlength="100"></textarea>
      <span class="char-count" id="charCount">0/100</span>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
      水をあげる ✦
    </button>
  </div>

  <!-- Log history -->
  <div class="log-history" id="logHistory" style="display:none;">
    <div class="log-title">✦ これまでの記録</div>
    <div id="logList"></div>
  </div>

  <!-- Completion -->
  <div class="completion" id="completionArea">
    <div class="completion-title">満開になりました</div>
    <div class="completion-sub">
      あなたたちの思いが<br>
      世界にひとつだけの花になりました。<br><br>
      この花は、あなたの1年間です。
    </div>
    <button class="reset-btn" onclick="resetDemo()">もう一度体験する</button>
  </div>

</div>

<script>
  let currentStage = 0;
  let logs = [];
  let currentPhotoData = null;

  const stageData = [
    {
      title: 'あなたの種、待っています',
      desc: '今日の写真と、一言を届けてください。\n思いが、花の栄養になります。',
    },
    {
      title: '芽が出てきました',
      desc: '小さな緑が顔を出しました。\nあなたの思いが、形になり始めています。',
    },
    {
      title: '花が育っています',
      desc: '蕾が膨らんでいます。\nあなたの日常が、色に変わっています。',
    },
    {
      title: '満開です',
      desc: '',
    }
  ];

  const emotionMap = [
    { keywords: ['嬉しい','楽しい','幸せ','最高','好き','笑','ありがとう','うまく','できた','一緒','初めて','デート','笑顔','素敵','最幸','いい','好調','ハッピー','happy','good','love'], emotion: 'bright', label: '✦ BRIGHT — 喜び', color: '#e8604a', petals: ['#ff9070','#ffb090','#ffd0b0','#ff8060','#ffb880'] },
    { keywords: ['穏やか','ゆっくり','のんびり','平和','静か','ほっ','安心','ぬくもり','自然','散歩','空','朝','夕','風','普通','今日','感謝'], emotion: 'calm', label: '✦ CALM — 穏やか', color: '#6a9a7a', petals: ['#90c8a0','#b0d8b8','#d0e8d0','#a8c8a8','#c0e0b0'] },
    { keywords: ['悲しい','つらい','しんどい','疲れ','不安','心配','寂しい','落ち込','辛い','難しい','涙','泣','病気','体調'], emotion: 'melancholy', label: '✦ MELANCHOLY — 静思', color: '#6a88bb', petals: ['#8090c0','#a0b0d8','#c0c8e8','#9090b8','#b0b8d0'] },
    { keywords: ['情熱','頑張','やる気','燃え','挑戦','夢','目標','絶対','負けない','熱い','興奮','ドキドキ','ワクワク'], emotion: 'passionate', label: '✦ PASSIONATE — 情熱', color: '#c84858', petals: ['#e05060','#f07080','#ff9090','#d04050','#f06070'] },
    { keywords: ['ロマン','愛','恋','出会い','記念','大切','宝','大事','忘れない','想い','二人','夫婦','結婚','プロポーズ'], emotion: 'romantic', label: '✦ ROMANTIC — 愛', color: '#c87090', petals: ['#e890a8','#f8a8b8','#ffc0c8','#d87890','#f0a0b0'] },
  ];

  function detectEmotion(text) {
    let best = null;
    let bestCount = 0;
    for (const e of emotionMap) {
      let count = 0;
      for (const kw of e.keywords) {
        if (text.includes(kw)) count++;
      }
      if (count > bestCount) { bestCount = count; best = e; }
    }
    return best || emotionMap[0];
  }

  function updateFlowerColor(emotion) {
    const petals = ['p-b1','p-b2','p-b3','p-b4','p-f1','p-f2','p-f3','p-f4'];
    petals.forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) {
        el.style.transition = 'fill 1.5s ease';
        el.setAttribute('fill', emotion.petals[i % emotion.petals.length]);
      }
    });
  }

  function updateStageIndicator(stage) {
    for (let i = 0; i <= 3; i++) {
      const el = document.getElementById(`stage-${i}`);
      el.classList.remove('active','done');
      if (i < stage) el.classList.add('done');
      else if (i === stage) el.classList.add('active');
    }
  }

  function showEmotion(emotion) {
    const badge = document.getElementById('emotionBadge');
    badge.textContent = emotion.label;
    badge.style.color = emotion.color;
    badge.style.borderColor = emotion.color;
    badge.classList.add('visible');
  }

  function transitionToStage(newStage, emotion) {
    const stages = ['seedGroup','sproutGroup','growingGroup','bloomGroup'];

    // Fade out current
    if (currentStage < stages.length) {
      const current = document.getElementById(stages[currentStage]);
      if (current) {
        current.style.transition = 'opacity 0.6s ease';
        current.style.opacity = '0';
      }
    }

    setTimeout(() => {
      // Show new stage
      const next = document.getElementById(stages[newStage]);
      if (next) {
        next.style.transition = 'opacity 1s ease, transform 1s ease';
        next.style.opacity = '1';
        next.style.transform = 'translate(0,0)';
      }

      // Color petals if blooming
      if (newStage === 3 && emotion) {
        setTimeout(() => updateFlowerColor(emotion), 300);
        triggerPetalBurst(emotion.petals[0]);
      }

      // Update text
      const data = stageData[newStage];
      const titleEl = document.getElementById('stageTitle');
      titleEl.style.opacity = '0';
      setTimeout(() => {
        titleEl.textContent = data.title;
        titleEl.style.transition = 'opacity 0.5s';
        titleEl.style.opacity = '1';
      }, 300);

      document.getElementById('stageDesc').textContent = data.desc;
      updateStageIndicator(newStage);
      currentStage = newStage;

      if (newStage === 3) {
        setTimeout(showCompletion, 2000);
      }
    }, 600);
  }

  function triggerPetalBurst(color) {
    for (let i = 0; i < 20; i++) {
      setTimeout(() => {
        const petal = document.createElement('div');
        petal.className = 'petal-burst';
        petal.textContent = ['🌸','✿','❀','✾'][Math.floor(Math.random()*4)];
        petal.style.left = (20 + Math.random()*60) + '%';
        petal.style.top = '-20px';
        petal.style.fontSize = (12 + Math.random()*16) + 'px';
        petal.style.animationDuration = (2 + Math.random()*3) + 's';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 5000);
      }, i * 80);
    }
  }

  function showCompletion() {
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('completionArea').classList.add('visible');
  }

  function addLog(text, photoData, emotion) {
    logs.push({ text, photoData, emotion });

    const listEl = document.getElementById('logList');
    const item = document.createElement('div');
    item.className = 'log-item';

    const thumb = document.createElement('div');
    thumb.className = 'log-thumb';
    if (photoData) {
      const img = document.createElement('img');
      img.src = photoData;
      img.style.cssText = 'width:40px;height:40px;border-radius:8px;object-fit:cover;';
      thumb.appendChild(img);
    } else {
      thumb.textContent = '🌿';
    }

    const content = document.createElement('div');
    content.className = 'log-content';
    const emo = document.createElement('div');
    emo.className = 'log-emotion';
    emo.textContent = emotion.label;
    emo.style.color = emotion.color;
    const txt = document.createElement('div');
    txt.className = 'log-text';
    txt.textContent = text;

    content.appendChild(emo);
    content.appendChild(txt);
    item.appendChild(thumb);
    item.appendChild(content);
    listEl.insertBefore(item, listEl.firstChild);

    document.getElementById('logHistory').style.display = 'block';
  }

  function handlePhoto(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      currentPhotoData = e.target.result;
      const preview = document.getElementById('uploadPreview');
      preview.src = currentPhotoData;
      preview.classList.add('visible');
      document.getElementById('uploadIcon').style.display = 'none';
      document.getElementById('uploadText').textContent = '写真を選択しました ✓';
    };
    reader.readAsDataURL(file);
  }

  function handleSubmit() {
    const text = document.getElementById('diaryInput').value.trim();
    if (!text) {
      document.getElementById('diaryInput').style.borderColor = '#e88080';
      setTimeout(() => document.getElementById('diaryInput').style.borderColor = '', 1000);
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '花に届けています…';

    const emotion = detectEmotion(text);
    showEmotion(emotion);
    addLog(text, currentPhotoData, emotion);

    setTimeout(() => {
      const nextStage = Math.min(currentStage + 1, 3);
      transitionToStage(nextStage, emotion);

      // Reset input
      document.getElementById('diaryInput').value = '';
      document.getElementById('charCount').textContent = '0/100';
      document.getElementById('uploadPreview').classList.remove('visible');
      document.getElementById('uploadIcon').style.display = 'block';
      document.getElementById('uploadText').textContent = '今日の写真を追加';
      document.getElementById('photoInput').value = '';
      currentPhotoData = null;

      if (nextStage < 3) {
        btn.disabled = false;
        btn.textContent = '水をあげる ✦';
      }
    }, 800);
  }

  function resetDemo() {
    currentStage = 0;
    logs = [];
    currentPhotoData = null;

    // Reset SVG stages
    const stages = ['sproutGroup','growingGroup','bloomGroup'];
    stages.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.opacity = '0'; }
    });
    document.getElementById('seedGroup').style.opacity = '1';

    // Reset petals color
    const petals = ['p-b1','p-b2','p-b3','p-b4','p-f1','p-f2','p-f3','p-f4'];
    petals.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.setAttribute('fill', '#f0a0a0');
    });

    updateStageIndicator(0);
    document.getElementById('stageTitle').textContent = stageData[0].title;
    document.getElementById('stageDesc').textContent = stageData[0].desc;
    document.getElementById('emotionBadge').classList.remove('visible');
    document.getElementById('logList').innerHTML = '';
    document.getElementById('logHistory').style.display = 'none';
    document.getElementById('inputArea').style.display = 'block';
    document.getElementById('completionArea').classList.remove('visible');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '水をあげる ✦';
  }

  // Char counter
  document.getElementById('diaryInput').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length + '/100';
  });

  // Enter key shortcut
  document.getElementById('diaryInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.metaKey) handleSubmit();
  });
</script>
</body>
